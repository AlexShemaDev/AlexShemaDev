name: Generate Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas
  workflow_dispatch:           # también manual desde GitHub
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution snake (red theme)
        uses: Platane/snk@v3
        with:
          github_user_name: AlexShemaDev
          outputs: |
            assets/contribution-grid.svg?palette=github-dark&color_snake=cc1414&color_dots[0]=0d0f12&color_dots[1]=3d1a1a&color_dots[2]=7a1414&color_dots[3]=cc1414&color_dots[4]=ff3333

      - name: Commit updated graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution graph"
          file_pattern: assets/contribution-grid.svg
